<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ICPC Academy</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/auth.css" />
<link rel="icon" type="image/png" href="../assets/favicon.png">
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>

  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-circle">🔑</div>
        <h1>ICPC <span>Academy</span></h1>
        <p>Reset your password</p>
      </div>

      <div class="auth-card">
        <h2>Forgot Password?</h2>
        <p class="auth-subtitle">Enter your email and we'll send a reset link</p>

        <div id="alert-box" class="alert error">
          <span>⚠️</span><span id="alert-msg"></span>
        </div>
        <div id="success-box" class="alert success">
          <span>✅</span><span>Reset link sent! Check your inbox.</span>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" />
        </div>

        <button id="reset-btn" class="btn btn-primary btn-full btn-lg" onclick="handleReset()">
          Send Reset Link
        </button>

        <div class="auth-footer mt-md">
          <a href="login.html">← Back to Login</a>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { auth } from '../js/core/firebase-config.js';
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    window.handleReset = async function() {
      const email    = document.getElementById('email').value.trim();
      const btn      = document.getElementById('reset-btn');
      const alertBox = document.getElementById('alert-box');
      const alertMsg = document.getElementById('alert-msg');
      const successBox = document.getElementById('success-box');

      alertBox.classList.remove('show');
      successBox.classList.remove('show');

      if (!email) {
        alertMsg.textContent = 'Please enter your email address.';
        alertBox.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending...';

      try {
        await sendPasswordResetEmail(auth, email);
        successBox.classList.add('show');
        btn.innerHTML = '✅ Sent!';
      } catch(err) {
        alertMsg.textContent = err.message || 'Failed to send reset email.';
        alertBox.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Send Reset Link';
      }
    };
  </script>
</body>
</html>
