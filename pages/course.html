<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course — ICPC Academy</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>

  <nav class="navbar" id="navbar"></nav>

  <div class="notif-panel" id="notif-panel">
    <div class="notif-panel-header">
      <span style="font-weight:700">🔔 Notifications</span>
      <button style="background:none;border:none;color:var(--text-muted);cursor:pointer" onclick="document.getElementById('notif-panel').classList.remove('open')">✕</button>
    </div>
    <div class="notif-panel-list" id="notif-list"></div>
  </div>

  <div class="page-wrapper">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">

      <!-- Level Tabs -->
      <div class="page-header">
        <h1>📚 Course</h1>
        <p>Select your level and navigate through weekly content</p>
      </div>

      <div id="level-tabs" class="tab-nav" style="max-width:400px">
        <!-- Rendered dynamically -->
      </div>

      <!-- Weeks Grid -->
      <div id="weeks-grid" class="grid-3">
        <div class="skeleton" style="height:140px;border-radius:20px"></div>
        <div class="skeleton" style="height:140px;border-radius:20px"></div>
        <div class="skeleton" style="height:140px;border-radius:20px"></div>
      </div>

      <!-- Week Content Panel -->
      <div id="week-content" style="display:none;margin-top:2rem">
        <div class="flex-between mb-lg">
          <div>
            <h2 id="week-title">Week</h2>
            <p id="week-desc" class="text-muted fs-sm mt-sm"></p>
          </div>
          <div class="flex gap-sm">
            <button class="btn btn-ghost btn-sm" id="back-to-weeks">← Back</button>
            <button class="btn btn-primary btn-sm" id="mark-week-done" style="display:none">Mark Week Complete ✓</button>
          </div>
        </div>

        <div style="margin-bottom:1.5rem">
          <div class="progress-label">
            <span>Week Progress</span>
            <span id="week-prog-pct">0%</span>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="week-prog-bar" style="width:0%"></div>
          </div>
        </div>

        <div id="sections-list">
          <!-- Sections rendered here -->
        </div>
      </div>

    </main>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { requireAuth, getUserProfile, isAdmin } from '../js/auth/auth.js';
    import { renderNavbar, renderSidebar, showToast } from '../js/dashboard/components.js';
    import { getLevels, getWeeks, getSections, getWeekProgress, markSectionComplete, awardBadge } from '../js/core/utils.js';
    import { db } from '../js/core/firebase-config.js';
    import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let currentUser, currentProfile, currentLevelId, currentWeekId, currentSections = [];

    async function init() {
      try { currentUser = await requireAuth(); } catch { return; }
      const admin = await isAdmin();
      renderNavbar('course');
      renderSidebar('course', admin);

      currentProfile = await getUserProfile(currentUser.uid);
      await loadLevels();
    }

    async function loadLevels() {
      const levels = await getLevels();
      const tabNav = document.getElementById('level-tabs');

      if (levels.length === 0) {
        document.getElementById('weeks-grid').innerHTML = '<p class="text-muted">No course content available yet.</p>';
        return;
      }

      tabNav.innerHTML = levels.map(l => `
        <button class="tab-btn" data-id="${l.id}" data-order="${l.order}">${l.title}</button>
      `).join('');

      const tabs = tabNav.querySelectorAll('.tab-btn');
      tabs.forEach(btn => btn.addEventListener('click', () => {
        tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLevelId = btn.dataset.id;
        loadWeeks(btn.dataset.id);
        document.getElementById('week-content').style.display = 'none';
        document.getElementById('weeks-grid').style.display = 'grid';
      }));

      // Auto-select first (or user's level)
      const userLevelOrder = currentProfile?.currentLevel ?? 0;
      const defaultTab     = [...tabs].find(t => parseInt(t.dataset.order) === userLevelOrder) || tabs[0];
      defaultTab.click();
    }

    async function loadWeeks(levelId) {
      const grid = document.getElementById('weeks-grid');
      grid.innerHTML = `
        <div class="skeleton" style="height:140px;border-radius:20px"></div>
        <div class="skeleton" style="height:140px;border-radius:20px"></div>
        <div class="skeleton" style="height:140px;border-radius:20px"></div>
      `;

      const weeks = await getWeeks(levelId);

      if (weeks.length === 0) {
        grid.innerHTML = '<p class="text-muted" style="grid-column:1/-1">No weeks available yet.</p>';
        return;
      }

      const userCurrentWeek = currentProfile?.currentWeek ?? 1;

      grid.innerHTML = await Promise.all(weeks.map(async (w, i) => {
        const weekNum    = w.order || (i + 1);
        const isUnlocked = weekNum <= userCurrentWeek;
        const secs       = await getSections(w.id);
        const prog       = isUnlocked ? await getWeekProgress(currentUser.uid, levelId, w.id, secs) : { percent: 0 };

        return `
          <div class="week-card ${isUnlocked ? '' : 'locked'}" data-id="${w.id}" data-num="${weekNum}" ${isUnlocked ? 'onclick="window._openWeek(\'' + w.id + '\',\'' + w.title + '\',\'' + (w.description||'') + '\','+weekNum+')"' : ''}>
            <div class="flex-between mb-sm">
              <span class="badge-chip ${isUnlocked ? (prog.percent===100?'green':'cyan') : 'red'}">
                ${isUnlocked ? (prog.percent===100 ? '✓ Done' : `Week ${weekNum}`) : `🔒 Locked`}
              </span>
              <span class="fs-xs text-muted">${secs.length} sections</span>
            </div>
            <h3 style="font-size:1rem;margin-bottom:0.5rem">${w.title}</h3>
            ${w.description ? `<p class="fs-xs text-muted mb-sm">${w.description}</p>` : ''}
            ${isUnlocked ? `
              <div class="progress-bar-wrap" style="height:4px">
                <div class="progress-bar-fill" style="width:${prog.percent}%"></div>
              </div>
            ` : ''}
          </div>
        `;
      })).then(cards => cards.join(''));
    }

    window._openWeek = async function(weekId, title, desc, weekNum) {
      currentWeekId = weekId;
      document.getElementById('week-title').textContent = title;
      document.getElementById('week-desc').textContent  = desc;
      document.getElementById('weeks-grid').style.display = 'none';
      document.getElementById('week-content').style.display = 'block';

      const list = document.getElementById('sections-list');
      list.innerHTML = '<div class="skeleton" style="height:60px;border-radius:12px;margin-bottom:0.75rem"></div>'.repeat(3);

      currentSections = await getSections(weekId);
      await renderSections();

      document.getElementById('back-to-weeks').onclick = () => {
        document.getElementById('week-content').style.display = 'none';
        document.getElementById('weeks-grid').style.display   = 'grid';
      };
    };

    async function renderSections() {
      const list = document.getElementById('sections-list');
      const profile = await getUserProfile(currentUser.uid);
      const progress = profile?.progress || {};

      if (currentSections.length === 0) {
        list.innerHTML = '<p class="text-muted">No sections in this week yet.</p>';
        return;
      }

      list.innerHTML = currentSections.map(s => {
        const key     = `${currentLevelId}_${currentWeekId}_${s.id}`;
        const done    = !!progress[key];
        const typeIcon = s.type === 'video' ? '▶️' : s.type === 'link' ? '🔗' : '📝';
        const typeClass = s.type || 'note';

        let bodyContent = '';
        if (s.type === 'video') {
          const embedUrl = getYouTubeEmbed(s.url || s.videoUrl || '');
          bodyContent = embedUrl
            ? `<div class="video-embed"><iframe src="${embedUrl}" allowfullscreen></iframe></div>`
            : `<a href="${s.url}" target="_blank" class="btn btn-outline btn-sm">▶ Watch Video</a>`;
        } else if (s.type === 'link') {
          bodyContent = `
            <div style="display:flex;flex-direction:column;gap:0.5rem">
              ${(s.links || [s]).map(l => `
                <a href="${l.url || s.url}" target="_blank" class="btn btn-outline btn-sm" style="justify-content:flex-start">
                  🔗 ${l.label || l.url || 'Open Link'}
                </a>
              `).join('')}
            </div>
          `;
        } else {
          bodyContent = `<div class="notes-content">${s.content || s.notes || 'No content.'}</div>`;
        }

        return `
          <div class="section-card ${done ? 'completed' : ''}" id="sc-${s.id}">
            <div class="section-header" onclick="toggleSection('${s.id}')">
              <div class="section-type-icon ${typeClass}">${typeIcon}</div>
              <span class="section-title">${s.title}</span>
              <div class="section-check ${done ? 'done' : ''}" id="chk-${s.id}"
                   onclick="event.stopPropagation(); window._toggleComplete('${s.id}', '${done}')"
                   title="${done ? 'Mark incomplete' : 'Mark complete'}">
                ${done ? '✓' : ''}
              </div>
            </div>
            <div class="section-body" id="body-${s.id}">
              ${bodyContent}
            </div>
          </div>
        `;
      }).join('');

      updateWeekProgress();
    }

    window.toggleSection = function(id) {
      const body = document.getElementById(`body-${id}`);
      body.classList.toggle('open');
    };

    window._toggleComplete = async function(sectionId, wasDone) {
      const isDone  = wasDone === 'true' || wasDone === true;
      const key     = `${currentLevelId}_${currentWeekId}_${sectionId}`;
      const userRef = doc(db, 'users', currentUser.uid);

      try {
        await updateDoc(userRef, { [`progress.${key}`]: !isDone });
        const chk = document.getElementById(`chk-${sectionId}`);
        const card = document.getElementById(`sc-${sectionId}`);
        if (!isDone) {
          chk.classList.add('done');
          chk.textContent = '✓';
          card.classList.add('completed');
          showToast('Section marked complete!', 'success');
          // Check if week is 100% done
          await checkWeekCompletion();
        } else {
          chk.classList.remove('done');
          chk.textContent = '';
          card.classList.remove('completed');
        }
        // Refresh check data
        chk.onclick = (e) => {
          e.stopPropagation();
          window._toggleComplete(sectionId, String(!isDone));
        };
        updateWeekProgress();
      } catch(e) {
        showToast('Failed to update progress.', 'error');
      }
    };

    async function updateWeekProgress() {
      const profile  = await getUserProfile(currentUser.uid);
      const progress = profile?.progress || {};
      const done     = currentSections.filter(s => progress[`${currentLevelId}_${currentWeekId}_${s.id}`]).length;
      const pct      = currentSections.length > 0 ? Math.round((done/currentSections.length)*100) : 0;

      document.getElementById('week-prog-pct').textContent = `${pct}%`;
      document.getElementById('week-prog-bar').style.width = `${pct}%`;

      const markBtn = document.getElementById('mark-week-done');
      markBtn.style.display = pct === 100 ? 'block' : 'none';
    }

    async function checkWeekCompletion() {
      const profile   = await getUserProfile(currentUser.uid);
      const progress  = profile?.progress || {};
      const allDone   = currentSections.every(s => progress[`${currentLevelId}_${currentWeekId}_${s.id}`]);

      if (allDone) {
        await awardBadge(currentUser.uid, 'first_week');
        await awardBadge(currentUser.uid, 'perfect_week');
        showToast('🎉 Week completed! Badges earned!', 'success', 'Week Complete');
      }
    }

    function getYouTubeEmbed(url) {
      if (!url) return null;
      const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      if (match) return `https://www.youtube.com/embed/${match[1]}`;
      if (url.includes('youtube.com/embed/')) return url;
      return null;
    }

    init();
  </script>
</body>
</html>
