<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — ICPC Academy</title>
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    /* ── PODIUM ── */
    .podium-card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 1.25rem 1rem 0;
      background: var(--bg-card);
      border-radius: 20px 20px 0 0;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease;
      position: relative;
      overflow: visible;
    }
    .podium-card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 20px 20px 0 0;
      background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
      overflow: hidden;
    }
    .podium-card:hover { transform: translateY(-6px); }

    .podium-avatar {
      width: 60px; height: 60px; /* overridden inline for gold */
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      border: 3px solid;
      margin-bottom: 0.6rem;
      box-shadow: 0 0 18px currentColor;
      flex-shrink: 0;
      position: relative; z-index: 1;
    }
    .podium-medal {
      position: absolute; top: 0.6rem; right: 0.6rem;
      z-index: 2;
      width: 28px; height: 28px;
      background: rgba(0,0,0,0.45);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .podium-handle {
      font-weight: 800; font-size: 0.88rem;
      text-align: center; z-index: 1;
      white-space: normal;
      word-break: break-word;
      overflow: visible;
      max-width: 120px;
      line-height: 1.2;
    }
    .podium-meta {
      font-size: 0.72rem; color: var(--text-muted);
      margin-top: 0.2rem; z-index: 1;
    }
    .podium-streak {
      font-size: 0.8rem; color: var(--warning);
      margin: 0.3rem 0 0.75rem; z-index: 1; font-weight: 700;
    }
    .podium-base {
      width: calc(100% + 2rem); margin: 0 -1rem;
      padding: 0.5rem 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1.3rem;
      z-index: 1;
      margin-top: auto;
    }

    /* ── TABLE ROW CLICKABLE ── */
    .lb-row {
      cursor: pointer;
      transition: background 0.15s;
    }
    .lb-row:hover td { background: rgba(0,212,255,0.06) !important; }

    /* ── AVATAR CELL ── */
    .lb-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--cyan-dim);
      border: 2px solid var(--border-hover);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    /* ── PROFILE MODAL ── */
    #modal-profile .modal { max-width: 420px; }

    .pmodal-header {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.6rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.25rem;
    }
    .pmodal-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      box-shadow: var(--cyan-glow);
      border: 3px solid rgba(0,212,255,0.4);
    }
    .pmodal-handle {
      font-size: 1.25rem; font-weight: 800;
      color: var(--text-primary);
    }
    .pmodal-stat {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.9rem;
    }
    .pmodal-stat:last-child { border-bottom: none; }
    .pmodal-stat-label { color: var(--text-muted); }
    .pmodal-stat-val   { font-weight: 700; color: var(--text-primary); }

    .pmodal-badges {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-top: 1rem;
    }
    .pmodal-badge-item {
      background: var(--cyan-dim);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: var(--radius-full);
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
      color: var(--cyan);
    }

    /* ── RESPONSIVE PODIUM ── */
    @media (max-width: 540px) {
      #podium { gap: 0.75rem !important; }
      .podium-card { width: 100px !important; }
      .podium-avatar { width: 48px; height: 48px; font-size: 1.6rem; }
      .podium-handle { font-size: 0.76rem; max-width: 90px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>

  <nav class="navbar" id="navbar"></nav>

  <div class="notif-panel" id="notif-panel">
    <div class="notif-panel-header">
      <span style="font-weight:700"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.35rem"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Notifications</span>
      <button style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.3rem"
        onclick="document.getElementById('notif-panel').classList.remove('open')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="notif-panel-list"></div>
  </div>

  <!-- ── USER PROFILE MODAL ── -->
  <div class="modal-overlay" id="modal-profile">
    <div class="modal" style="max-width:420px">
      <div class="modal-header">
        <h3>Player Profile</h3>
        <button class="modal-close" onclick="document.getElementById('modal-profile').classList.remove('open')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div id="modal-profile-body">
        <div class="skeleton" style="height:200px;border-radius:12px"></div>
      </div>
    </div>
  </div>

  <div class="page-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">

      <div class="page-header">
        <h1><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.4rem"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>Leaderboard</h1>
        <p>See who's leading the ECPC preparation race</p>
      </div>

      <!-- Top 3 Podium -->
      <div id="podium" class="mb-lg"
        style="display:flex;justify-content:center;align-items:flex-end;gap:1.5rem;min-height:260px">
        <div class="skeleton" style="width:130px;height:160px;border-radius:20px 20px 0 0"></div>
        <div class="skeleton" style="width:130px;height:200px;border-radius:20px 20px 0 0"></div>
        <div class="skeleton" style="width:130px;height:140px;border-radius:20px 20px 0 0"></div>
      </div>

      <!-- Full Table -->
      <div class="card card-glow">
        <div class="flex-between mb-md">
          <h3>Full Rankings</h3>
          <span class="fs-sm text-muted" id="total-count">Loading...</span>
        </div>

        <div style="overflow-x:auto">
          <table class="data-table" id="leaderboard-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Player</th>
                <th>Level</th>
                <th>Week</th>
                <th><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.25rem"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 3z"/></svg>Streak</th>
                <th>Badges</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body">
              <tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { requireAuth, isAdmin } from '../js/auth/auth.js';
    import { renderNavbar, renderSidebar } from '../js/dashboard/components.js';
    import { getLeaderboard, BADGES } from '../js/core/utils.js';

    let myUid = null;
    const usersMap = new Map(); // id → user object (avoids huge inline JSON in onclick)

    async function init() {
      let user;
      try { user = await requireAuth(); } catch { return; }
      myUid = user.uid;
      const admin = await isAdmin();
      renderNavbar('leaderboard');
      renderSidebar('leaderboard', admin);

      const leaders = await getLeaderboard();
      leaders.forEach(u => usersMap.set(u.id, u));
      renderPodium(leaders.slice(0, 3));
      renderTable(leaders);
      document.getElementById('total-count').textContent = `${leaders.length} participants`;
    }

    /* ── Avatar helper: supports emoji & base64 images ── */
    function avatarHTML(value, size = '36px') {
      if (value && value.startsWith('data:')) {
        return `<img src="${value}" style="width:${size};height:${size};border-radius:50%;object-fit:cover;display:block" />`;
      }
      return value || '🧑';
    }

    /* ── PODIUM ─────────────────────────────────────────── */
    function renderPodium(top3) {
      const podium  = document.getElementById('podium');
      const order   = [1, 0, 2]; // silver → gold → bronze (visual L→R)
      const heights = ['185px', '245px', '150px'];
      const medals  = [
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C0C0C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>',
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>',
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#CD7F32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>',
      ];
      const colors  = ['#C0C0C0', '#FFD700', '#CD7F32'];
      const nums    = ['2', '1', '3'];

      podium.innerHTML = order.map((i, vi) => {
        const u = top3[i];
        if (!u) return `<div style="width:130px;height:${heights[vi]}"></div>`;
        const isMe   = u.id === myUid;
        const handle = u.codeforcesHandle || 'Anonymous';

        return `
          <div class="podium-card"
            style="width:130px;min-height:${heights[vi]};border-color:${colors[vi]};box-shadow:0 0 24px ${colors[vi]}40;${isMe ? 'outline:2px solid var(--cyan);outline-offset:3px;' : ''}"
            onclick="openUserProfile('${u.id}')">

            <div class="podium-medal" style="display:inline-flex;align-items:center;justify-content:center">${medals[vi]}</div>

            <div class="podium-avatar"
              style="border-color:${colors[vi]};color:${colors[vi]};background:${colors[vi]}18;width:${vi===1?'72px':'58px'};height:${vi===1?'72px':'58px'}">
              ${avatarHTML(u.avatar, vi === 1 ? '64px' : '50px')}
            </div>

            <div class="podium-handle" style="color:${colors[vi]}">${handle}</div>
            <div class="podium-meta">Lvl ${u.currentLevel ?? 0} · W${u.currentWeek ?? 1}</div>
            <div class="podium-streak" style="display:flex;align-items:center;gap:0.3rem"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 3z"/></svg> ${u.streak ?? 0}</div>

            <div class="podium-base" style="background:${colors[vi]}22;color:${colors[vi]}">
              ${nums[vi]}
            </div>
          </div>
        `;
      }).join('');
    }

    /* ── TABLE ──────────────────────────────────────────── */
    function renderTable(leaders) {
      const tbody = document.getElementById('leaderboard-body');
      tbody.innerHTML = leaders.map(u => {
        const isMe      = u.id === myUid;
        const rankClass = u.rank === 1 ? 'gold' : u.rank === 2 ? 'silver' : u.rank === 3 ? 'bronze' : 'other';

        return `
          <tr class="lb-row ${isMe ? 'my-row' : ''}"
            style="${isMe ? 'background:var(--cyan-dim)' : ''}"
            onclick="openUserProfile('${u.id}')">

            <td><div class="rank-badge ${rankClass}" style="width:30px;height:30px;font-size:0.8rem">${u.rank}</div></td>

            <td>
              <div style="display:flex;align-items:center;gap:0.65rem">
                <div class="lb-avatar" style="overflow:hidden">${avatarHTML(u.avatar, '36px')}</div>
                <div>
                  <div style="font-weight:700;font-size:0.9rem">
                    ${u.codeforcesHandle || 'Anonymous'}
                    ${isMe ? '<span class="badge-chip cyan" style="font-size:0.66rem;margin-left:4px;padding:0.1rem 0.5rem">You</span>' : ''}
                  </div>
                  <div class="fs-xs text-muted">${u.email?.split('@')[0] || ''}</div>
                </div>
              </div>
            </td>

            <td><span class="badge-chip cyan">Lvl ${u.currentLevel ?? 0}</span></td>
            <td style="color:var(--text-secondary)">W${u.currentWeek ?? 1}</td>
            <td style="color:var(--warning);font-weight:700;display:flex;align-items:center;gap:0.3rem">${u.streak ?? 0} <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 3z"/></svg></td>
            <td style="color:var(--cyan);font-weight:600">${(u.badges||[]).length} <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg></td>
          </tr>
        `;
      }).join('');
    }

    /* ── OPEN PROFILE MODAL ─────────────────────────────── */
    window.openUserProfile = function(uid) {
      const u = usersMap.get(uid);
      if (!u) return;

      const isMe     = u.id === myUid;
      const handle   = u.codeforcesHandle || 'Anonymous';
      const earnedBadges = (u.badges || []);

      // Avatar — emoji or real photo
      const avatarEl = u.avatar && u.avatar.startsWith('data:')
        ? `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" />`
        : (u.avatar || '🧑');

      // Build badge chips
      let badgeHTML = '';
      if (earnedBadges.length > 0 && typeof BADGES !== 'undefined') {
        badgeHTML = earnedBadges.map(bid => {
          const b = Object.values(BADGES).find(x => x.id === bid);
          return b ? `<span class="pmodal-badge-item">${b.icon} ${b.label}</span>` : '';
        }).join('');
      } else if (earnedBadges.length === 0) {
        badgeHTML = '<span class="text-muted fs-xs">No badges yet</span>';
      }

      // Rank decoration
      const medalSvg = (stroke) => `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.25rem"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>`;
      const rankLabel = u.rank === 1 ? medalSvg('#FFD700')+'#1' : u.rank === 2 ? medalSvg('#C0C0C0')+'#2' : u.rank === 3 ? medalSvg('#CD7F32')+'#3' : '#'+u.rank;

      document.getElementById('modal-profile-body').innerHTML = `
        <div class="pmodal-header">
          <div class="pmodal-avatar" style="overflow:hidden">${avatarEl}</div>
          <div class="pmodal-handle">${handle} ${isMe ? '<span class="badge-chip cyan" style="font-size:0.7rem">You</span>' : ''}</div>
          <div class="fs-xs text-muted">${u.email || ''}</div>
        </div>

        <div>
          <div class="pmodal-stat">
            <span class="pmodal-stat-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.3rem"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>Rank</span>
            <span class="pmodal-stat-val" style="color:var(--gold)">${rankLabel}</span>
          </div>
          <div class="pmodal-stat">
            <span class="pmodal-stat-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.3rem"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>Level</span>
            <span class="pmodal-stat-val"><span class="badge-chip cyan">Level ${u.currentLevel ?? 0}</span></span>
          </div>
          <div class="pmodal-stat">
            <span class="pmodal-stat-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.3rem"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Current Week</span>
            <span class="pmodal-stat-val">Week ${u.currentWeek ?? 1}</span>
          </div>
          <div class="pmodal-stat">
            <span class="pmodal-stat-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.3rem"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 3z"/></svg>Streak</span>
            <span class="pmodal-stat-val" style="color:var(--warning)">${u.streak ?? 0} days</span>
          </div>
          <div class="pmodal-stat">
            <span class="pmodal-stat-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.3rem"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>Badges Earned</span>
            <span class="pmodal-stat-val">${earnedBadges.length}</span>
          </div>
        </div>

        ${earnedBadges.length > 0 ? `
          <div style="margin-top:1rem">
            <div class="fs-xs text-muted" style="margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.08em">Badges</div>
            <div class="pmodal-badges">${badgeHTML}</div>
          </div>
        ` : ''}

        <div style="margin-top:1.5rem">
          <a href="https://codeforces.com/profile/${handle}" target="_blank"
            class="btn btn-outline btn-full btn-sm">
            View Codeforces Profile ↗
          </a>
        </div>
      `;

      document.getElementById('modal-profile').classList.add('open');
    };

    // Close modal on overlay click
    document.getElementById('modal-profile').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });

    init();
  </script>
</body>
</html>
