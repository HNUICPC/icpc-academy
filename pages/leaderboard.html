<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — ICPC Academy</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>

  <nav class="navbar" id="navbar"></nav>

  <div class="notif-panel" id="notif-panel">
    <div class="notif-panel-header">
      <span style="font-weight:700">🔔 Notifications</span>
      <button style="background:none;border:none;color:var(--text-muted);cursor:pointer" onclick="document.getElementById('notif-panel').classList.remove('open')">✕</button>
    </div>
    <div class="notif-panel-list"></div>
  </div>

  <div class="page-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">

      <div class="page-header">
        <h1>🏆 Leaderboard</h1>
        <p>See who's leading the ECPC preparation race</p>
      </div>

      <!-- Top 3 Podium -->
      <div id="podium" class="mb-lg" style="display:flex;justify-content:center;align-items:flex-end;gap:1.5rem;min-height:200px">
        <div class="skeleton" style="width:150px;height:160px;border-radius:20px"></div>
        <div class="skeleton" style="width:150px;height:200px;border-radius:20px"></div>
        <div class="skeleton" style="width:150px;height:140px;border-radius:20px"></div>
      </div>

      <!-- Full Table -->
      <div class="card card-glow">
        <div class="flex-between mb-md">
          <h3>Full Rankings</h3>
          <span class="fs-sm text-muted" id="total-count">Loading...</span>
        </div>

        <div style="overflow-x:auto">
          <table class="data-table" id="leaderboard-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Handle</th>
                <th>Level</th>
                <th>Week</th>
                <th>🔥 Streak</th>
                <th>Badges</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body">
              <tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { requireAuth, isAdmin } from '../js/auth/auth.js';
    import { renderNavbar, renderSidebar } from '../js/dashboard/components.js';
    import { getLeaderboard } from '../js/core/utils.js';

    async function init() {
      let user;
      try { user = await requireAuth(); } catch { return; }
      const admin = await isAdmin();
      renderNavbar('leaderboard');
      renderSidebar('leaderboard', admin);

      const leaders = await getLeaderboard();
      renderPodium(leaders.slice(0, 3), user.uid);
      renderTable(leaders, user.uid);
      document.getElementById('total-count').textContent = `${leaders.length} participants`;
    }

    function renderPodium(top3, myUid) {
      const podium = document.getElementById('podium');
      const order  = [1, 0, 2]; // silver, gold, bronze visual order
      const heights = [160, 200, 140];
      const medals  = ['🥈', '🥇', '🥉'];
      const colors  = ['#C0C0C0', '#FFD700', '#CD7F32'];

      podium.innerHTML = order.map((i, vi) => {
        const u = top3[i];
        if (!u) return `<div style="width:150px;height:${heights[vi]}px"></div>`;
        const isMe = u.id === myUid;
        return `
          <div style="
            width:150px;height:${heights[vi]}px;
            background:var(--bg-card);
            border:2px solid ${colors[vi]};
            border-radius:20px 20px 0 0;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            gap:0.5rem;padding:1rem;
            box-shadow:0 0 20px ${colors[vi]}30;
            ${isMe ? 'outline:2px solid var(--cyan);outline-offset:3px' : ''}
          ">
            <div style="font-size:2rem">${medals[vi]}</div>
            <div style="font-weight:800;font-size:0.95rem;text-align:center;color:${colors[vi]}">${u.codeforcesHandle || 'Anonymous'}</div>
            <div class="fs-xs text-muted">Level ${u.currentLevel} · W${u.currentWeek}</div>
            <div style="font-size:0.8rem;color:var(--warning)">🔥 ${u.streak}</div>
          </div>
        `;
      }).join('');
    }

    function renderTable(leaders, myUid) {
      const tbody = document.getElementById('leaderboard-body');
      tbody.innerHTML = leaders.map(u => {
        const isMe     = u.id === myUid;
        const rankClass = u.rank === 1 ? 'gold' : u.rank === 2 ? 'silver' : u.rank === 3 ? 'bronze' : 'other';
        return `
          <tr style="${isMe ? 'background:var(--cyan-dim)' : ''}">
            <td><div class="rank-badge ${rankClass}" style="width:28px;height:28px;font-size:0.8rem">${u.rank}</div></td>
            <td>
              <div style="font-weight:600">${u.codeforcesHandle || 'Anonymous'}${isMe ? ' <span class="badge-chip cyan" style="font-size:0.68rem;margin-left:4px">You</span>' : ''}</div>
              <div class="fs-xs text-muted">${u.email || ''}</div>
            </td>
            <td><span class="badge-chip cyan">Level ${u.currentLevel}</span></td>
            <td>Week ${u.currentWeek}</td>
            <td style="color:var(--warning);font-weight:700">${u.streak} 🔥</td>
            <td style="color:var(--cyan)">
              ${(u.badges||[]).length} 🏅
            </td>
          </tr>
        `;
      }).join('');
    }

    init();
  </script>
</body>
</html>
