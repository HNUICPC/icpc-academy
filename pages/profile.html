<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — ICPC Academy</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>

  <nav class="navbar" id="navbar"></nav>

  <div class="notif-panel" id="notif-panel">
    <div class="notif-panel-header">
      <span style="font-weight:700"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.35rem"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Notifications</span>
      <button style="background:none;border:none;color:var(--text-muted);cursor:pointer"
        onclick="document.getElementById('notif-panel').classList.remove('open')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="notif-panel-list"></div>
  </div>

  <div class="page-wrapper">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">

      <div class="page-header">
        <h1><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.4rem"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>My Profile</h1>
        <p>View and manage your academy profile</p>
      </div>

      <div class="grid-2">

        <!-- Profile Card -->
        <div class="card card-glow">

          <div style="text-align:center;padding:1rem 0 1.5rem">

            <!-- Avatar -->
            <div id="avatar-icon" style="
              width:80px;height:80px;
              background:linear-gradient(135deg,var(--cyan),var(--blue));
              border-radius:50%;
              display:flex;align-items:center;justify-content:center;
              font-size:2rem;margin:0 auto 1rem;
              box-shadow:var(--cyan-glow);
              overflow:hidden;
            ">🧑</div>

            <h2 id="profile-handle" style="font-size:1.3rem">Loading...</h2>
            <p id="profile-email" class="text-muted fs-sm mt-sm"></p>

            <div style="margin-top:0.75rem">
              <span class="badge-chip cyan" id="profile-level">Level 0</span>
            </div>

            <!-- Avatar Picker -->
            <div class="glow-divider"></div>

            <h4 style="margin:0.5rem 0">Choose Avatar</h4>

            <!-- Upload photo button -->
            <label for="avatar-upload" id="upload-label-btn" style="
              display:flex;align-items:center;justify-content:center;gap:0.5rem;
              padding:0.5rem 1rem;margin-bottom:0.75rem;
              border:2px dashed var(--border-hover);
              border-radius:10px;cursor:pointer;
              font-size:0.82rem;color:var(--text-muted);
              transition:border-color 0.2s,color 0.2s;
              background:var(--bg-card2);
            "
              onmouseover="this.style.borderColor='var(--cyan)';this.style.color='var(--cyan)'"
              onmouseout="this.style.borderColor='var(--border-hover)';this.style.color='var(--text-muted)'">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.35rem"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>Upload your photo
            </label>
            <input id="avatar-upload" type="file" accept="image/*"
              style="display:none" onchange="window.handleAvatarUpload(event)" />

            <!-- Progress bar (hidden by default) -->
            <div id="upload-progress" style="display:none;margin-bottom:0.5rem">
              <div style="height:4px;border-radius:2px;background:var(--border);overflow:hidden">
                <div id="upload-bar" style="
                  height:100%;width:0%;
                  background:linear-gradient(90deg,var(--cyan),var(--blue));
                  transition:width 0.3s;
                "></div>
              </div>
              <div id="upload-status" style="font-size:0.72rem;color:var(--text-muted);margin-top:0.25rem;text-align:center">
                Processing...
              </div>
            </div>

            <div id="avatar-grid" style="
              display:grid;
              grid-template-columns:repeat(4,1fr);
              gap:0.5rem;
              margin-top:0.5rem;
            "></div>

          </div>

          <div class="glow-divider"></div>

          <div style="display:flex;flex-direction:column;gap:0.75rem">
            <div class="flex-between">
              <span class="text-muted fs-sm"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.35rem"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 3z"/></svg>Current Streak</span>
              <span id="p-streak" style="font-weight:700;color:var(--warning)">—</span>
            </div>
            <div class="flex-between">
              <span class="text-muted fs-sm"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.35rem"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Member Since</span>
              <span id="p-since" class="fs-sm">—</span>
            </div>
            <div class="flex-between">
              <span class="text-muted fs-sm"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.35rem"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>Badges</span>
              <span id="p-badges" class="fs-sm text-cyan">—</span>
            </div>
            <div class="flex-between">
              <span class="text-muted fs-sm"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.35rem"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Progress Items</span>
              <span id="p-progress" class="fs-sm text-success">—</span>
            </div>
          </div>

          <div class="glow-divider"></div>

          <a id="cf-link" target="_blank"
            class="btn btn-outline btn-full btn-sm">
            View Codeforces Profile ↗
          </a>

        </div>

        <!-- Badges -->
        <div class="card card-glow">
          <h3 class="mb-md"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.4rem"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>All Badges</h3>
          <div id="all-badges-grid"
            style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem">
          </div>
        </div>

      </div>

      <!-- Notifications -->
      <div class="card card-glow mt-lg">
        <div class="flex-between mb-md">
          <h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.4rem"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"/></svg>Notification History</h3>
          <button class="btn btn-ghost btn-sm" onclick="markAllRead()">
            Mark All Read
          </button>
        </div>

        <div id="notif-history">
          <div class="skeleton" style="height:60px;border-radius:8px;margin-bottom:0.5rem"></div>
          <div class="skeleton" style="height:60px;border-radius:8px"></div>
        </div>
      </div>

    </main>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { requireAuth, getUserProfile, isAdmin } from '../js/auth/auth.js';
    import { renderNavbar, renderSidebar, showToast } from '../js/dashboard/components.js';
    import { BADGES, getUserNotifications, markNotificationRead } from '../js/core/utils.js';
    import { db } from '../js/core/firebase-config.js';
    import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const AVATARS = [
      "🧑","👨","👩","🧔","👨‍💻","👩‍💻","🧠","😎",
      "🤓","🥷","👑","🦸","🧑‍🚀","👨‍🔬","👩‍🔬","🧙"
    ];

    let currentUser;

    function renderAvatars(selected) {
      const grid = document.getElementById('avatar-grid');

      grid.innerHTML = AVATARS.map(a => `
        <div onclick="window.selectAvatar('${a}')"
          style="
            font-size:1.5rem;
            padding:0.5rem;
            border-radius:10px;
            cursor:pointer;
            text-align:center;
            border:2px solid ${selected === a ? 'var(--cyan)' : 'var(--border)'};
            background:${selected === a ? 'rgba(0,212,255,0.1)' : 'var(--bg-card2)'};
            transition:0.2s;
          ">
          ${a}
        </div>
      `).join('');
    }

    /* ── Helper: render avatar (emoji or base64 image) ── */
    function setAvatarDisplay(value) {
      const el = document.getElementById('avatar-icon');
      if (value && value.startsWith('data:')) {
        el.innerHTML = `<img src="${value}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" />`;
      } else {
        el.innerHTML = value || '🧑';
      }
    }

    window.selectAvatar = async (avatar) => {
      setAvatarDisplay(avatar);
      renderAvatars(avatar);
      const userRef = doc(db, "users", currentUser.uid);
      await updateDoc(userRef, { avatar });
      showToast("Avatar updated", "success");
    };

    /* ── Image Upload → compress → base64 → Firestore ── */
    window.handleAvatarUpload = async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      // Validate type
      if (!file.type.startsWith('image/')) {
        showToast("Please choose an image file", "error");
        return;
      }

      const progressWrap = document.getElementById('upload-progress');
      const bar          = document.getElementById('upload-bar');
      const status       = document.getElementById('upload-status');

      progressWrap.style.display = 'block';
      bar.style.width = '20%';
      status.textContent = 'Reading image…';

      try {
        // Compress & convert to base64 via Canvas
        const base64 = await compressImage(file, 200, 200, 0.75, (p) => {
          bar.style.width = `${20 + p * 60}%`;
        });

        bar.style.width = '85%';
        status.textContent = 'Saving…';

        // Check size — Firestore doc limit is 1 MB
        if (base64.length > 900_000) {
          showToast("Image too large after compression. Try a smaller photo.", "error");
          progressWrap.style.display = 'none';
          return;
        }

        const userRef = doc(db, "users", currentUser.uid);
        await updateDoc(userRef, { avatar: base64 });

        bar.style.width = '100%';
        status.textContent = 'Done!';

        setAvatarDisplay(base64);
        renderAvatars('__custom__'); // deselect all emoji

        showToast("Profile photo updated", "success");

        setTimeout(() => { progressWrap.style.display = 'none'; bar.style.width = '0%'; }, 1200);

      } catch (err) {
        console.error(err);
        showToast("Upload failed. Try again.", "error");
        progressWrap.style.display = 'none';
      }

      // Reset input so same file can be re-picked
      e.target.value = '';
    };

    /* ── Canvas compression helper ── */
    function compressImage(file, maxW, maxH, quality, onProgress) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = (ev) => {
          onProgress && onProgress(0.2);
          const img = new Image();
          img.onerror = reject;
          img.onload = () => {
            onProgress && onProgress(0.5);
            // Calculate scaled dimensions (maintain aspect ratio)
            let w = img.width, h = img.height;
            if (w > h) { if (w > maxW) { h = h * maxW / w; w = maxW; } }
            else        { if (h > maxH) { w = w * maxH / h; h = maxH; } }

            const canvas = document.createElement('canvas');
            canvas.width  = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            onProgress && onProgress(0.9);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function init() {
      try { currentUser = await requireAuth(); } catch { return; }

      const admin = await isAdmin();
      renderNavbar('profile');
      renderSidebar('profile', admin);

      const profile = await getUserProfile(currentUser.uid);
      if (!profile) return;

      document.getElementById('profile-handle').textContent =
        profile.codeforcesHandle || 'No handle';

      document.getElementById('profile-email').textContent =
        profile.email || currentUser.email;

      document.getElementById('profile-level').textContent =
        `Level ${profile.currentLevel ?? 0} · Week ${profile.currentWeek ?? 1}`;

      document.getElementById('p-streak').textContent =
        `${profile.streak ?? 0} days`;

      document.getElementById('p-badges').textContent =
        `${(profile.badges||[]).length} earned`;

      document.getElementById('p-progress').textContent =
        `${Object.values(profile.progress||{}).filter(Boolean).length} completed`;

      document.getElementById('cf-link').href =
        `https://codeforces.com/profile/${profile.codeforcesHandle}`;

      if (profile.createdAt?.toDate) {
        document.getElementById('p-since').textContent =
          profile.createdAt.toDate().toLocaleDateString('en-US', {
            year:'numeric', month:'long'
          });
      }

      // avatar
      const savedAvatar = profile.avatar || "🧑";
      setAvatarDisplay(savedAvatar);

      // if it's a custom photo, don't highlight any emoji
      renderAvatars(savedAvatar.startsWith('data:') ? '__custom__' : savedAvatar);

      renderAllBadges(profile.badges || []);
      loadNotifHistory();
    }

    function renderAllBadges(earned) {
      const grid = document.getElementById('all-badges-grid');

      grid.innerHTML = Object.values(BADGES).map(b => {
        const isEarned = earned.includes(b.id);

        return `
          <div style="
            padding:1rem 0.5rem;
            background:var(--bg-card2);
            border:1px solid ${isEarned ? 'rgba(0,212,255,0.3)' : 'var(--border)'};
            border-radius:12px;
            text-align:center;
            opacity:${isEarned ? '1' : '0.4'};
          ">
            <div style="font-size:2rem;margin-bottom:0.4rem">${b.icon}</div>
            <div style="font-size:0.7rem;font-weight:600">
              ${b.label}
            </div>
          </div>
        `;
      }).join('');
    }

    async function loadNotifHistory() {
      const container = document.getElementById('notif-history');

      try {
        const notifs = await getUserNotifications(currentUser.uid);

        if (notifs.length === 0) {
          container.innerHTML = '<p class="text-muted fs-sm text-center" style="padding:2rem">No notifications yet.</p>';
          return;
        }

        container.innerHTML = notifs.map(n => {
          const time = n.createdAt?.toDate ? n.createdAt.toDate().toLocaleString() : '';
          const iconSvg = {
            warning:      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#FFA116" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.3rem"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
            announcement: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(0,212,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.3rem"><path d="M22 17l-9-5-9 5 9-5 9 5z"/><path d="M3 17v-5l9-5 9 5v5"/></svg>',
            target:       '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(80,220,120,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:0.3rem"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
          };
          const icon = iconSvg[n.type] || iconSvg.target;

          return `
            <div class="notif-item ${n.read ? '' : 'unread'}"
              id="ni-${n.id}"
              onclick="window._readNotif('${n.id}')">

              <div class="notif-dot ${n.read ? 'read' : ''}"></div>

              <div style="flex:1">
                <div class="notif-item-title">${icon} ${n.title}</div>
                <div class="notif-item-msg">${n.message}</div>
                <div class="notif-item-time">${time}</div>
              </div>
            </div>
          `;
        }).join('');

      } catch {
        container.innerHTML = '<p class="text-muted fs-sm">Could not load notifications.</p>';
      }
    }

    window._readNotif = async (id) => {
      await markNotificationRead(id);
      document.getElementById(`ni-${id}`)?.classList.remove('unread');
    };

    window.markAllRead = async () => {
      const notifs = await getUserNotifications(currentUser.uid);
      await Promise.all(notifs.map(n => markNotificationRead(n.id)));
      showToast('All notifications marked as read', 'success');
      loadNotifHistory();
    };

    init();
  </script>

</body>
</html>
